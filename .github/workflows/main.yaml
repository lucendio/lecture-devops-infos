name: 'Publish to GitHub Pages'

on:
  push:
    branches:
      - 'main'
  workflow_dispatch: {}

concurrency:
  group: 'main'
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: '[Deps] Pull in theme: hugo-book'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: 'alex-shpak/hugo-book'
          ref: 'v10'
          path: './src/themes/book'


      - name: '[Deps] Set up Hugo in runtime context'
        uses: peaceiris/actions-hugo@2752ce1d29631191ea3f27c23495fa06139a5b78 # v3.2.1
        with:
          # TODO: obtain version from config/_default/module.json
          hugo-version: '0.136.5'
          extended: true

      - name: 'Build site with Hugo'
        run: |
          hugo \
            --config ./config \
            --environment prod \
            --destination ./.local/build \
            --minify

      - name: 'Upload build result as github-pages artifact'
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: './.local/build'


  deploy:
    runs-on: ubuntu-latest
    needs: [ 'build' ]
    permissions:
      pages: 'write'
      id-token: 'write'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 'Deploy to GitHub Pages'
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
